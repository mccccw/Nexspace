version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexspace
      POSTGRES_PASSWORD: nexspace_dev_pw
      POSTGRES_DB: nexspace_db
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
  meilisearch:
    image: getmeili/meilisearch:v1.6
    restart: unless-stopped
    ports: ["7700:7700"]
    environment:
      MEILI_MASTER_KEY: nexspace_meilisearch_master_key
      MEILI_ENV: development
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports: ["1025:1025", "8025:8025"]
volumes:
  postgres_data:
